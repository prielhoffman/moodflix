services:
  db:
    # Postgres image with pgvector pre-installed
    image: pgvector/pgvector:pg16
    container_name: moodflix-db
    restart: always
    environment:
      # Provide safe defaults so `docker compose up` works even without a local .env file
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-moodflix}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-enable extensions on first DB init (only runs when the data volume is empty)
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: moodflix-backend
    container_name: moodflix-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-moodflix}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    depends_on:
      - db
    entrypoint: ["/app/scripts/docker-entrypoint.sh"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: moodflix-frontend
    container_name: moodflix-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Keep container node_modules; host mount would otherwise hide them
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
